# Deploy configuration with grouped services

# Task tracking system URL prefix (e.g., https://jira.company.com/browse/)
task_url_prefix: https://srv-ecp-jira-01.bft.local/browse/

# Artifacts whose version should NOT be updated anywhere
skip_version_update:
  - groupId: ru.ps.base
    artifactId: aggregate-parent
  - groupId: ru.ps.base
    artifactId: business-operation-parent
  - groupId: ru.ps.base
    artifactId: bpm-cec-parent

# Properties whose version should NOT be updated
skip_properties:
  - ru.gov.pfr.ecp.apso.skl.starter.skl-exceptions.version
  - ru.gov.pfr.ecp.evs.ds.skl.provider.interaction.service.client.version

# Sequential services (executed one by one)
sequential:
  - name: skl-api
    directory: skl-api
    gitlab_project: ecp/skl/skl-api

  - name: skl-act-aggregate
    directory: skl-act-aggregate
    gitlab_project: ecp/skl/skl-act-aggregate

  - name: skl-application-aggregate
    directory: skl-application-aggregate
    gitlab_project: ecp/skl/skl-application-aggregate

  - name: skl-contract-aggregate
    directory: skl-contract-aggregate
    gitlab_project: ecp/skl/skl-contract-aggregate

  - name: skl-decision-aggregate
    directory: skl-decision-aggregate
    gitlab_project: ecp/skl/skl-decision-aggregate

  - name: skl-statement-aggregate
    directory: skl-statement-aggregate
    gitlab_project: ecp/skl/skl-statement-aggregate

  - name: skl-common
    directory: skl-common
    gitlab_project: ecp/skl/skl-common

  - name: person-benefit-category-aggregate
    directory: person-benefit-category-aggregate
    gitlab_project: ecp/skl/glk/person-benefit-category-aggregate

  - name: person-benefit-category-bo
    directory: person-benefit-category-bo
    gitlab_project: ecp/skl/glk/person-benefit-category-bo

  - name: person-benefit-category-knd
    directory: person-benefit-category-knd
    gitlab_project: ecp/skl/glk/person-benefit-category-knd

# Grouped services (executed in parallel within each group)
groups:
  # Backend services group
  bo:
    - name: skl-referral-paperwork-service
      directory: skl-referral-paperwork-service
      gitlab_project: ecp/proezd/skl-referral-paperwork-service

    - name: skl-decision-bo
      directory: skl-decision-bo
      gitlab_project: ecp/proezd/skl-decision-bo

    - name: skl-statement-bo
      directory: skl-statement-bo
      gitlab_project: ecp/proezd/skl-statement-bo

    - name: skl-application-bo
      directory: skl-application-bo
      gitlab_project: ecp/proezd/skl-application-bo

    - name: skl-contract-bo
      directory: skl-contract-bo
      gitlab_project: ecp/proezd/skl-contract-bo

    - name: skl-act-bo
      directory: skl-act-bo
      gitlab_project: ecp/proezd/skl-act-bo

    - name: skl-contract-evs-service
      directory: skl-contract-evs-service
      gitlab_project: ecp/proezd/skl-contract-evs-service

    - name: skl-camunda-service
      directory: skl-camunda-service
      gitlab_project: ecp/proezd/skl-camunda-service

    - name: skl
      directory: skl
      gitlab_project: ecp/proezd/skl
